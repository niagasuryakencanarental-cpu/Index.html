<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.firebasestorage.app",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ================= ELEMENT =================
const el=id=>document.getElementById(id);

const btnFoto=el("btnFoto");
const cameraInput=el("cameraInput");
const preview=el("preview");
const nik=el("nik");
const nama=el("nama");
const ttl=el("ttl");
const check=el("check");
const box=el("box");
const loading=el("loadingScreen");
const loadingText=el("loadingText");
const uploadBar=el("uploadBar");
const uploadProgress=el("uploadProgress");
const scoreText=el("scoreText");

let fileBlob=null;

// ================= COMPRESS =================
async function compressImage(file){
 return new Promise(resolve=>{
  const img=new Image();
  img.src=URL.createObjectURL(file);

  img.onload=()=>{
   const canvas=document.createElement("canvas");
   const ctx=canvas.getContext("2d");

   let maxW=800;
   let scale=maxW/img.width;

   canvas.width=maxW;
   canvas.height=img.height*scale;

   ctx.drawImage(img,0,0,canvas.width,canvas.height);

   canvas.toBlob(blob=>{
    resolve(blob);
   },"image/jpeg",0.7);
  };
 });
}

// ================= LOAD FACE =================
async function loadFaceSafe(){
 try{
  await Promise.race([
   faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models'),
   new Promise((_,reject)=>setTimeout(()=>reject("timeout"),5000))
  ]);
  return true;
 }catch{
  return false;
 }
}

// ================= CAMERA =================
btnFoto.onclick=()=>cameraInput.click();

cameraInput.onchange=async e=>{
 try{
  let file=e.target.files[0];
  if(!file) return;

  loading.style.display="flex";
  loadingText.innerText="Kompres gambar...";

  fileBlob=await compressImage(file);

  if(fileBlob.size>2*1024*1024){
   alert("Ukuran >2MB, ulangi foto");
   loading.style.display="none";
   return;
  }

  preview.src=URL.createObjectURL(fileBlob);
  preview.style.display="block";

  const img=new Image();
  img.src=preview.src;
  await new Promise(r=>img.onload=r);

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=600;
  canvas.height=(img.height/img.width)*600;
  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  const faceReady=await loadFaceSafe();

  if(faceReady){
   loadingText.innerText="Deteksi wajah...";
   try{
    await faceapi.detectAllFaces(canvas,new faceapi.TinyFaceDetectorOptions({inputSize:256}));
   }catch{}
  }

  // ================= OCR =================
  loadingText.innerText="Membaca NIK 0%";

  const nikCanvas=document.createElement("canvas");
  const nctx=nikCanvas.getContext("2d");

  let nx=canvas.width*0.05;
  let ny=canvas.height*0.15;
  let nw=canvas.width*0.6;
  let nh=canvas.height*0.2;

  nikCanvas.width=nw;
  nikCanvas.height=nh;

  nctx.drawImage(canvas,nx,ny,nw,nh,0,0,nw,nh);

  const result=await Tesseract.recognize(nikCanvas,'eng',{
   tessedit_char_whitelist:'0123456789',
   logger:m=>{
    if(m.status==="recognizing text"){
     let p=Math.round(m.progress*100);
     loadingText.innerText="Membaca NIK "+p+"%";
    }
   }
  });

  // ================= NIK FIX =================
  let text = result.data.text.replace(/\D/g,'');

  let kandidat = text.match(/\d{10,}/g);
  let nikFinal = "";

  if(kandidat){
    nikFinal = kandidat.find(x=>x.length===16) || kandidat[0];
  }

  nik.value = nikFinal || "";
  nik.dispatchEvent(new Event("input"));

  // highlight
  if(nikFinal){
    nik.style.background="#003366";
    setTimeout(()=>nik.style.background="",500);
  }

  // ================= AUTO TTL =================
  if(nik.value.length===16){
   let t=nik.value.substr(6,2);
   let b=nik.value.substr(8,2);
   let y=nik.value.substr(10,2);
   if(t>40)t-=40;
   ttl.value=`${t} / ${b} / 19${y}`;
  }

  // ================= FORMAT NAMA =================
  nama.value=nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');

  loading.style.display="none";
  box.style.display="block";
  scoreText.innerText="Scan selesai";

 }catch(e){
  alert("Error: "+e);
  loading.style.display="none";
 }
};

// ================= INPUT =================
nik.oninput=()=>nik.value=nik.value.replace(/[^0-9]/g,'');

nama.addEventListener("input",()=>{
 nama.value=nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');
});

// ================= UPLOAD =================
check.addEventListener("change",async()=>{
 if(!check.checked||!fileBlob) return;

 uploadBar.style.display="block";

 const fileName="ktp_"+Date.now()+".jpg";
 const ref=storage.ref("ktp/"+fileName);

 const uploadTask=ref.put(fileBlob);

 uploadTask.on("state_changed",
  snap=>{
   let progress=(snap.bytesTransferred/snap.totalBytes)*100;
   uploadProgress.style.width=progress+"%";
  },
  err=>{
   alert("Upload gagal");
  },
  async()=>{
   const url=await ref.getDownloadURL();

   await db.collection("verifikasi").add({
    nik:nik.value,
    nama:nama.value,
    ttl:ttl.value,
    foto:url,
    created_at:new Date()
   });

   alert("Data berhasil disimpan");
  }
 );
});

</script>
