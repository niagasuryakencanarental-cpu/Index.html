<!DOCTYPE html>
<html>
<head>
  <title>Form Calon Pelanggan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: #fff;
      background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
    }

    .frame {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(90deg, #d4af37, #ffd700);
      color: #000;
    }

    /* INFO */
    .info {
      text-align: right;
      font-size: 12px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.4);
      color: #ffd700;
      line-height: 1.4;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    /* FORM */
    .form-group {
      background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .form-group h4 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: normal;
    }

    input[type="file"],
    select,
    input[type="text"] {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }

    select { margin-bottom: 6px; }

    /* STATUS */
    .status {
      margin-top: 6px;
      font-size: 12px;
      color: #00e676;
    }

    /* FOOTER */
    .footer {
      padding: 10px;
      background: #111;
    }

    .lanjut {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: bold;
    }

    .active {
      background: linear-gradient(90deg, #d4af37, #ffd700);
      color: #000;
    }

    .disabled {
      background: #444;
      color: #aaa;
    }

  </style>
</head>

<body>

<div class="frame">

  <!-- HEADER -->
  <div class="header">
    Form Calon Pelanggan
  </div>

  <!-- INFO -->
  <div class="info">
    <div id="lokasi">Lokasi: -</div>
    <div id="time"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="form-group">
      <h4>1. Upload KTP</h4>
      <input type="file" id="ktp" accept="image/*" capture="environment">
      <div id="statusKtp" class="status"></div>
    </div>

    <div class="form-group">
      <h4>2. Upload KTP + Selfie</h4>
      <input type="file" id="selfie" accept="image/*" capture="user">
      <div id="statusSelfie" class="status"></div>
    </div>

    <div class="form-group">
      <h4>3. Upload Data Pendukung</h4>

      <select id="dokumenType">
        <option value="">Pilih Dokumen</option>
        <option value="KK">KK</option>
        <option value="NPWP">NPWP</option>
        <option value="ID_KERJA">ID Kerja</option>
        <option value="BPJS">BPJS TK</option>
      </select>

      <input type="file" id="dokumen" accept="image/*" capture="environment">
      <div id="statusDokumen" class="status"></div>
    </div>

    <div class="form-group">
      <h4>4. Nomor WhatsApp</h4>
      <input type="text" id="wa" placeholder="+628xxxx">
      <div id="statusWa" class="status"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button id="lanjut" class="lanjut disabled" disabled>Lanjutkan</button>
  </div>

</div>

<script>
let data = {};

// TIME
setInterval(() => {
  const now = new Date();
  time.innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();
}, 1000);

// LOKASI
navigator.geolocation.getCurrentPosition(pos => {
  lokasi.innerText =
    "Lat: " + pos.coords.latitude.toFixed(4) +
    ", Lng: " + pos.coords.longitude.toFixed(4);
});

// INPUT
ktp.onchange = () => {
  data.ktp = ktp.files[0];
  statusKtp.innerText = "✔ KTP berhasil diupload";
  cek();
};

selfie.onchange = () => {
  data.selfie = selfie.files[0];
  statusSelfie.innerText = "✔ Selfie berhasil diupload";
  cek();
};

dokumen.onchange = () => {
  if (!dokumenType.value) {
    alert("Pilih dokumen dulu!");
    dokumen.value = "";
    return;
  }
  data.dokumen = dokumen.files[0];
  statusDokumen.innerText =
    "✔ " + dokumenType.value + " berhasil diupload";
  cek();
};

dokumenType.onchange = () => {
  data.dokumenType = dokumenType.value;
};

wa.oninput = () => {
  data.wa = wa.value;
  statusWa.innerText =
    data.wa.length > 8 ? "✔ Nomor valid" : "";
  cek();
};

// VALIDASI
function cek(){
  const valid =
    data.ktp &&
    data.selfie &&
    data.dokumen &&
    data.wa &&
    data.dokumenType;

  lanjut.disabled = !valid;
  lanjut.className = valid ? "lanjut active" : "lanjut disabled";
}

// ACTION
lanjut.onclick = () => {
  alert("Semua data lengkap ✅");
};
</script>

</body>
</html>
