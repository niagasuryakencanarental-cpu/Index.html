<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title><!-- FIREBASE --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script><!-- OCR --><script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script><style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
h2{margin-bottom:15px}

input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#00c896;
  color:#000;
  font-weight:bold;
}

#preview{
  max-width:90%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

#loadingScreen{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

#uploadBar{
  display:none;
  width:90%;
  height:10px;
  background:#333;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

#uploadProgress{
  height:10px;
  width:0%;
  background:#00ffcc;
}
</style></head><body><h2>Verifikasi Pelanggan</h2><button id="btnFoto">Ambil Foto KTP</button>
<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<img id="preview"><input id="nik" placeholder="NIK" inputmode="numeric">
<input id="nama" placeholder="Nama">
<input id="ttl" placeholder="Tanggal Lahir"><label>
  <input type="checkbox" id="check"> Kirim Data
</label><div id="uploadBar">
  <div id="uploadProgress"></div>
</div><div id="loadingScreen">
  <p id="loadingText">Loading...</p>
</div><p id="scoreText"></p><script>
// ================= ERROR HANDLER =================
window.onerror = function(e){
  document.body.innerHTML += "<p style='color:red'>"+e+"</p>";
};

document.addEventListener("DOMContentLoaded",()=>{

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.firebasestorage.app",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ================= ELEMENT =================
const $ = id => document.getElementById(id);

const btnFoto = $("btnFoto");
const cameraInput = $("cameraInput");
const preview = $("preview");
const nik = $("nik");
const nama = $("nama");
const ttl = $("ttl");
const check = $("check");
const loading = $("loadingScreen");
const loadingText = $("loadingText");
const uploadBar = $("uploadBar");
const uploadProgress = $("uploadProgress");
const scoreText = $("scoreText");

let fileBlob = null;

// ================= COMPRESS =================
function compressImage(file){
  return new Promise(resolve=>{
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const scale = 800 / img.width;
      canvas.width = 800;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      canvas.toBlob(blob=>resolve(blob),"image/jpeg",0.7);
    };
  });
}

// ================= AUTO CROP NIK =================
function cropNIKArea(img){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  // Area NIK (estimasi posisi KTP Indonesia)
  const x = img.width * 0.05;
  const y = img.height * 0.18;
  const w = img.width * 0.7;
  const h = img.height * 0.18;

  canvas.width = w;
  canvas.height = h;

  ctx.drawImage(img, x, y, w, h, 0, 0, w, h);

  return canvas;
}

// ================= FOTO =================
btnFoto.onclick = () => cameraInput.click();

cameraInput.onchange = async (e)=>{
  try{
    const file = e.target.files[0];
    if(!file) return;

    loading.style.display="flex";
    loadingText.innerText="Memproses gambar...";

    fileBlob = await compressImage(file);

    if(fileBlob.size > 2*1024*1024){
      alert("Ukuran > 2MB");
      loading.style.display="none";
      return;
    }

    preview.src = URL.createObjectURL(fileBlob);
    preview.style.display="block";

    // ================= LOAD IMAGE =================
    const img = new Image();
    img.src = preview.src;
    await new Promise(r=>img.onload=r);

    // ================= CROP NIK =================
    const nikCanvas = cropNIKArea(img);

    loadingText.innerText="Scan NIK...";

    // ================= OCR =================
    const result = await Tesseract.recognize(nikCanvas,'eng',{
      tessedit_char_whitelist:'0123456789',
      logger:m=>{
        if(m.status==="recognizing text"){
          loadingText.innerText = "Scan "+Math.round(m.progress*100)+"%";
        }
      }
    });

    const text = result.data.text.replace(/\D/g,'');
    const nikMatch = text.match(/\d{16}/);

    nik.value = nikMatch ? nikMatch[0] : "";

    // ================= AUTO TTL =================
    if(nik.value.length === 16){
      let t = parseInt(nik.value.substr(6,2));
      let b = nik.value.substr(8,2);
      let y = nik.value.substr(10,2);

      if(t > 40) t -= 40;
      ttl.value = `${t}/${b}/19${y}`;
    }

    loading.style.display="none";
    scoreText.innerText="Scan selesai";

  }catch(err){
    alert("Error: "+err);
    loading.style.display="none";
  }
};

// ================= VALIDASI =================
nik.oninput = () => {
  nik.value = nik.value.replace(/[^0-9]/g,'');
};

nama.oninput = () => {
  nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');
};

// ================= UPLOAD =================
check.onchange = async ()=>{
  if(!check.checked || !fileBlob) return;

  uploadBar.style.display="block";

  const ref = storage.ref("ktp/ktp_"+Date.now()+".jpg");
  const uploadTask = ref.put(fileBlob);

  uploadTask.on("state_changed",
    snap=>{
      const p = (snap.bytesTransferred/snap.totalBytes)*100;
      uploadProgress.style.width = p+"%";
    },
    ()=>alert("Upload gagal"),
    async ()=>{
      const url = await ref.getDownloadURL();

      await db.collection("verifikasi").add({
        nik: nik.value,
        nama: nama.value,
        ttl: ttl.value,
        foto: url,
        created_at: new Date()
      });

      alert("Data berhasil disimpan");
    }
  );
};

});
</script></body>
</html>
