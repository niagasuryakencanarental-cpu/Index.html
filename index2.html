<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Upload</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: #fff;
  background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
  opacity: 0;
  transition: opacity 0.3s;
}

.header {
  text-align: center;
  padding: 12px;
  background: linear-gradient(90deg, #d4af37, #ffd700);
  color: #000;
  font-weight: bold;
}

.info {
  text-align: right;
  padding: 6px 10px;
  font-size: 12px;
  background: rgba(0,0,0,0.4);
  color: #ffd700;
}

.content {
  padding: 15px;
}

.form-group {
  background: #2a2a2a;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.status {
  font-size: 12px;
  color: #00e676;
  margin-top: 5px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
}

.active {
  background: linear-gradient(90deg, #d4af37, #ffd700);
  color: black;
}

.disabled {
  background: #444;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">Form Calon Pelanggan</div>

<div class="info">
  <div id="lokasi">Lokasi: -</div>
  <div id="time"></div>
</div>

<div class="content">

  <div class="form-group">
    Upload KTP
    <input type="file" id="ktp" accept="image/*" capture="environment">
    <div id="s1" class="status"></div>
  </div>

  <div class="form-group">
    Upload Selfie + KTP
    <input type="file" id="selfie" accept="image/*" capture="user">
    <div id="s2" class="status"></div>
  </div>

  <div class="form-group">
    Pilih Dokumen
    <select id="jenis">
      <option value="">Pilih</option>
      <option>KK</option>
      <option>NPWP</option>
      <option>ID Kerja</option>
      <option>BPJS</option>
    </select>

    <input type="file" id="dokumen" accept="image/*" capture="environment">
    <div id="s3" class="status"></div>
  </div>

  <div class="form-group">
    Nomor WhatsApp
    <input type="text" id="wa">
    <div id="s4" class="status"></div>
  </div>

  <button id="lanjut" class="disabled" disabled>Kirim</button>

</div>

<script>
// 🔐 CEK AKSES
if(localStorage.getItem("agree") !== "yes"){
  window.location.href = "index.html";
}

// fade in
window.onload = () => {
  document.body.style.opacity = "1";
};

let data = {};

// waktu
setInterval(()=>{
  time.innerText = new Date().toLocaleString();
},1000);

// lokasi
navigator.geolocation.getCurrentPosition(p=>{
  lokasi.innerText =
    "Lat:" + p.coords.latitude.toFixed(3) +
    " Lng:" + p.coords.longitude.toFixed(3);
});

// input
ktp.onchange = () => { data.ktp=1; s1.innerText="✔ OK"; cek(); };
selfie.onchange = () => { data.selfie=1; s2.innerText="✔ OK"; cek(); };

dokumen.onchange = () => {
  if(!jenis.value){
    alert("Pilih jenis dokumen!");
    return;
  }
  data.dokumen=1;
  s3.innerText="✔ "+jenis.value;
  cek();
};

wa.oninput = () => {
  data.wa=wa.value;
  s4.innerText = wa.value.length>8 ? "✔ valid":"";
  cek();
};

// validasi
function cek(){
  const valid =
    data.ktp &&
    data.selfie &&
    data.dokumen &&
    data.wa &&
    jenis.value;

  lanjut.disabled = !valid;
  lanjut.className = valid ? "active":"disabled";
}

// submit
lanjut.onclick = ()=>{
  alert("Data siap dikirim 🔥");
};
</script>

</body>
</html>
