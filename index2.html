<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Calon Pelanggan</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  opacity:0;
  transition:0.3s;
}

.header {
  padding:12px;
  text-align:center;
  background:linear-gradient(90deg,#d4af37,#ffd700);
  color:#000;
  font-weight:bold;
}

.content { padding:15px; }

.form-group {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.status { font-size:12px; color:#00e676; }

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
}

.active { background:linear-gradient(90deg,#d4af37,#ffd700); color:#000; }
.disabled { background:#444; color:#aaa; }

#progressBox { display:none; margin-top:10px; }
#progressBar { height:8px; width:0%; background:#ffd700; }
</style>
</head>

<body>

<div class="header">Form Calon Pelanggan</div>

<div class="content">

  <div class="form-group">
    Upload KTP
    <input type="file" id="ktp" accept="image/*">
    <div id="s1" class="status"></div>
  </div>

  <div class="form-group">
    Upload Selfie
    <input type="file" id="selfie" accept="image/*">
    <div id="s2" class="status"></div>
  </div>

  <div class="form-group">
    Dokumen Pendukung
    <select id="jenis">
      <option value="">Pilih salah satu</option>
      <option>KK</option>
      <option>NPWP</option>
      <option>ID Kerja</option>
      <option>BPJSTK</option>
    </select>
    <input type="file" id="dokumen" accept="image/*">
    <div id="s3" class="status"></div>
  </div>

  <div class="form-group">
    Nomor WhatsApp
    <input type="tel" id="wa" placeholder="08xxxxxxxxxx">
    <div id="s4" class="status"></div>
  </div>

  <div class="form-group">
    <div id="infoLokasi" style="font-size:12px;color:#ffd700;">
      Mengambil lokasi...
    </div>
  </div>

  <div id="progressBox">
    <div style="background:#333;border-radius:8px;overflow:hidden;">
      <div id="progressBar"></div>
    </div>
  </div>

  <button id="lanjut" class="disabled" disabled>Kirim</button>

</div>

<!-- 🔥 SCRIPT DI BAWAH (PENTING) -->
<script type="module">

/* 🔥 DEBUG (biar gak blank lagi) */
window.onerror = (m) => alert("ERROR: " + m);

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.appspot.com",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* DOM SAFE */
const el = (id) => document.getElementById(id);

const ktp = el("ktp");
const selfie = el("selfie");
const dokumen = el("dokumen");
const jenis = el("jenis");
const wa = el("wa");

const s1 = el("s1");
const s2 = el("s2");
const s3 = el("s3");
const s4 = el("s4");

const btn = el("lanjut");
const progressBox = el("progressBox");
const progressBar = el("progressBar");
const infoLokasi = el("infoLokasi");

/* STATE */
let data = {};

/* FORMAT WA */
const clean = v => v.replace(/\D/g,"");

function formatWA(v){
  v = clean(v);
  if(v.startsWith("8")) v="0"+v;
  if(!v.startsWith("08")) v="08";
  return v.slice(0,13);
}

const validWA = v => /^08\d{8,11}$/.test(v);
const toIntl = v => v.replace(/^0/,"+62");

/* TIME */
const now = () => new Date().toLocaleString();

/* LOCATION */
function getLocation(){
  if(!navigator.geolocation){
    infoLokasi.innerText="GPS tidak support";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude.toFixed(5);
    const lng = pos.coords.longitude.toFixed(5);

    data.lokasi = `Lat:${lat}, Lng:${lng}`;
    infoLokasi.innerText = "📍 " + data.lokasi + "\n🕒 " + now();

  },()=>{
    infoLokasi.innerText="Lokasi ditolak";
    data.lokasi = "-";
  });
}

/* UPLOAD */
function upload(file,path){
  return new Promise((res,rej)=>{
    if(!file) return rej(new Error("File kosong"));

    const task = uploadBytesResumable(ref(storage,path),file);

    task.on("state_changed",snap=>{
      const p = snap.bytesTransferred/snap.totalBytes*100;
      progressBar.style.width = p+"%";
    },rej,async()=>{
      res(await getDownloadURL(task.snapshot.ref));
    });
  });
}

/* VALIDASI */
function cek(){
  const ok =
    data.ktp &&
    data.selfie &&
    data.dokumen &&
    data.wa &&
    jenis.value;

  btn.disabled = !ok;
  btn.className = ok ? "active":"disabled";
}

/* EVENTS */
ktp.onchange=()=>{
  data.ktp=ktp.files[0];
  s1.innerText="✔ OK";
  cek();
};

selfie.onchange=()=>{
  data.selfie=selfie.files[0];
  s2.innerText="✔ OK";
  cek();
};

dokumen.onchange=()=>{
  if(!jenis.value) return alert("Pilih dokumen dulu!");
  data.dokumen=dokumen.files[0];
  s3.innerText="✔ "+jenis.value;
  cek();
};

wa.oninput=()=>{
  wa.value=formatWA(wa.value);

  if(validWA(wa.value)){
    data.wa=wa.value;
    s4.innerText="✔ valid";
  }else{
    data.wa=null;
    s4.innerText="";
  }

  cek();
};

/* SUBMIT */
btn.onclick=async()=>{
  if(btn.disabled) return;

  btn.disabled=true;
  btn.innerText="Uploading...";
  progressBox.style.display="block";

  try{
    const t = Date.now();
    const waIntl = toIntl(data.wa);

    const [ktpUrl,selfieUrl,dokUrl] = await Promise.all([
      upload(data.ktp,"ktp/"+t),
      upload(data.selfie,"selfie/"+t),
      upload(data.dokumen,"dok/"+t)
    ]);

    await addDoc(collection(db,"pelanggan"),{
      waktu:new Date(),
      waktuText:now(),
      lokasi:data.lokasi || "-",
      wa:waIntl,
      jenis:jenis.value,
      ktp:ktpUrl,
      selfie:selfieUrl,
      dokumen:dokUrl
    });

    alert("Berhasil 🔥");
    location.reload();

  }catch(e){
    alert("Gagal: " + e.message);
    btn.disabled=false;
    btn.innerText="Kirim";
    progressBox.style.display="none";
  }
};

/* INIT */
window.onload=()=>{
  document.body.style.opacity="1";
  getLocation();
};

</script>

</body>
</html>
