<!DOCTYPE html>
<html>
<head>
  <title>Verifikasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ================= LIBRARY ================= -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>

</head>

<body style="font-family:sans-serif; padding:20px;">

<h2>Form Verifikasi</h2>

<input id="nik" placeholder="NIK"><br><br>
<input id="nama" placeholder="NAMA"><br><br>
<input id="ttl" placeholder="DD/MM/YYYY"><br><br>

<button id="btnFoto">Ambil Foto</button>
<input type="file" id="cameraInput" accept="image/*" style="display:none"><br><br>

<img id="preview" width="200" style="display:none"><br><br>

<button id="btnKirim" style="display:none">Kirim</button>

<br><br>

<div id="loadingScreen" style="display:none">Loading...</div>
<div id="popup" style="display:none">Berhasil!</div>

<div id="uploadBar" style="display:none; width:100%; background:#ddd;">
  <div id="uploadProgress" style="height:10px; width:0%; background:green;"></div>
</div>

<span id="percentText"></span>

<!-- ================= SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  console.log("Script jalan");

  // ================= FIREBASE =================
  const firebaseConfig = {
    apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
    authDomain: "nskrental-bbf87.firebaseapp.com",
    projectId: "nskrental-bbf87",
    storageBucket: "nskrental-bbf87.appspot.com",
    messagingSenderId: "654715207587",
    appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ================= ELEMENT =================
  const get = id => document.getElementById(id);

  const btnFoto = get("btnFoto");
  const cameraInput = get("cameraInput");
  const preview = get("preview");

  const nik = get("nik");
  const nama = get("nama");
  const ttl = get("ttl");
  const btnKirim = get("btnKirim");

  const uploadBar = get("uploadBar");
  const uploadProgress = get("uploadProgress");
  const percentText = get("percentText");

  const loading = get("loadingScreen");
  const popup = get("popup");

  let fileBlob = null;

  // ================= KOMPRES =================
  const compressImage = file => new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 1280;

      let { width, height } = img;

      if (width > maxWidth) {
        height *= maxWidth / width;
        width = maxWidth;
      }

      canvas.width = width;
      canvas.height = height;

      canvas.getContext("2d").drawImage(img, 0, 0, width, height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });

  // ================= VALIDASI =================
  const cekForm = () => {
    btnKirim.style.display =
      (nik.value && nama.value && ttl.value) ? "block" : "none";
  };

  nik.oninput = () => {
    nik.value = nik.value.replace(/[^0-9]/g, '');
    cekForm();
  };

  nama.oninput = () => {
    nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g, '');
    cekForm();
  };

  ttl.oninput = () => {
    let v = ttl.value.replace(/[^0-9]/g, '').slice(0, 8);

    if (v.length >= 5) {
      ttl.value = `${v.slice(0,2)}/${v.slice(2,4)}/${v.slice(4,8)}`;
    } else if (v.length >= 3) {
      ttl.value = `${v.slice(0,2)}/${v.slice(2,4)}`;
    } else {
      ttl.value = v;
    }

    cekForm();
  };

  // ================= FOTO =================
  btnFoto.onclick = () => cameraInput.click();

  cameraInput.onchange = async e => {
    try {
      const file = e.target.files[0];
      if (!file) return;

      loading.style.display = "block";

      const compressed = await compressImage(file);

      if (compressed.size > 2 * 1024 * 1024) {
        alert("Ukuran > 2MB");
        loading.style.display = "none";
        return;
      }

      fileBlob = compressed;

      preview.src = URL.createObjectURL(fileBlob);
      preview.style.display = "block";

      const result = await Tesseract.recognize(fileBlob, 'eng');
      const text = result.data.text.replace(/\D/g, '');
      const nikMatch = text.match(/\d{16}/);

      nik.value = nikMatch ? nikMatch[0] : "";

      cekForm();
    } catch (err) {
      alert("Gagal membaca gambar");
      console.error(err);
    } finally {
      loading.style.display = "none";
    }
  };

  // ================= UPLOAD =================
  btnKirim.onclick = async () => {
    try {
      if (!fileBlob) {
        alert("Ambil foto dulu");
        return;
      }

      uploadBar.style.display = "block";

      const formData = new FormData();
      formData.append("file", fileBlob);
      formData.append("upload_preset", "ml_default");

      const res = await fetch("https://api.cloudinary.com/v1_1/dppi5twst/image/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!data.secure_url) throw new Error("Upload gagal");

      uploadProgress.style.width = "100%";
      percentText.innerText = "100%";

      await db.collection("verifikasi").add({
        nik: nik.value,
        nama: nama.value,
        ttl: ttl.value,
        foto: data.secure_url,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });

      popup.style.display = "block";

    } catch (err) {
      alert("Upload gagal: " + err.message);
      console.error(err);
    }
  };

  // ================= LANJUT =================
  window.lanjut = () => {
    location.href = "index3.html";
  };

});
</script>

</body>
</html>
