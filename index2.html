<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:'Orbitron';text-align:center;}
.frame{width:85%;max-width:420px;aspect-ratio:10/6;border:2mm solid #888;margin:20px auto;border-radius:10px;background:#111;display:flex;justify-content:center;align-items:center;position:relative;}
.frame img{width:100%;height:100%;object-fit:cover;display:none;}
.label{position:absolute;color:#00aaff;}
.btn{width:85%;max-width:420px;padding:14px;margin:10px auto;background:linear-gradient(45deg,#003366,#0055aa);color:#000;font-weight:900;border:none;border-radius:8px;}
.input{width:85%;max-width:420px;padding:10px;margin:5px auto;border-radius:6px;border:none;}
.checkbox{display:none;margin:10px;}
#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column;}
.loader{border:5px solid #222;border-top:5px solid #00aaff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
#uploadBar{display:none;width:85%;margin:auto;}
#uploadProgress{height:10px;background:#00aaff;width:0%;}
</style>
</head>

<body>

<h2>VERIFIKASI PELANGGAN</h2>

<div class="frame">
 <img id="preview">
 <div class="label">FOTO KTP</div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
<button class="btn" id="btnFoto">AMBIL FOTO</button>

<input class="input" id="nik" placeholder="NIK" inputmode="numeric">
<input class="input" id="nama" placeholder="Nama">
<input class="input" id="ttl" placeholder="Tanggal Lahir" inputmode="numeric">

<div class="checkbox" id="box">
 <input type="checkbox" id="check"> Data sudah sesuai
</div>

<p id="scoreText"></p>

<div id="uploadBar"><div id="uploadProgress"></div></div>

<div id="loadingScreen">
 <div class="loader"></div>
 <p>Processing...</p>
</div>

<script>

// ================= ELEMENT =================
const btnFoto=document.getElementById("btnFoto");
const cameraInput=document.getElementById("cameraInput");
const preview=document.getElementById("preview");
const nik=document.getElementById("nik");
const nama=document.getElementById("nama");
const ttl=document.getElementById("ttl");
const check=document.getElementById("check");
const box=document.getElementById("box");
const loading=document.getElementById("loadingScreen");
const uploadBar=document.getElementById("uploadBar");
const uploadProgress=document.getElementById("uploadProgress");
const scoreText=document.getElementById("scoreText");

let fileBlob=null;

// ================= LOAD FACE MODEL =================
async function loadFace(){
 await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
}
loadFace();

// ================= CAMERA =================
btnFoto.onclick=()=>cameraInput.click();

cameraInput.onchange=async e=>{
 const file=e.target.files[0];
 fileBlob=file;

 preview.src=URL.createObjectURL(file);
 preview.style.display="block";

 loading.style.display="flex";

 const img=new Image();
 img.src=preview.src;
 await new Promise(r=>img.onload=r);

 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");

 canvas.width=1000;
 canvas.height=(img.height/img.width)*1000;
 ctx.drawImage(img,0,0,canvas.width,canvas.height);

 // ================= DETEKSI WAJAH =================
 const detections = await faceapi.detectAllFaces(
  canvas,
  new faceapi.TinyFaceDetectorOptions()
 );

 if(detections.length===0){
  alert("Wajah tidak terdeteksi");
  loading.style.display="none";
  return;
 }

 // ================= CROP WAJAH =================
 const faceBox = detections[0].box;
 const faceCanvas=document.createElement("canvas");
 const fctx=faceCanvas.getContext("2d");

 faceCanvas.width=faceBox.width;
 faceCanvas.height=faceBox.height;

 fctx.drawImage(canvas,
  faceBox.x, faceBox.y,
  faceBox.width, faceBox.height,
  0,0,
  faceCanvas.width, faceCanvas.height
 );

 // ================= CROP NIK =================
 const nikCanvas=document.createElement("canvas");
 const nctx=nikCanvas.getContext("2d");

 let nx = canvas.width * 0.05;
 let ny = canvas.height * 0.15;
 let nw = canvas.width * 0.6;
 let nh = canvas.height * 0.2;

 nikCanvas.width=nw;
 nikCanvas.height=nh;

 nctx.drawImage(canvas,nx,ny,nw,nh,0,0,nw,nh);

 // ================= PREPROCESS NIK =================
 let data=nctx.getImageData(0,0,nw,nh);
 let d=data.data;

 for(let i=0;i<d.length;i+=4){
  let avg=(d[i]+d[i+1]+d[i+2])/3;
  let v=avg>140?255:0;
  d[i]=d[i+1]=d[i+2]=v;
 }
 nctx.putImageData(data,0,0);

 // ================= OCR NIK =================
 const result=await Tesseract.recognize(nikCanvas,'eng',{
  tessedit_char_whitelist:'0123456789'
 });

 let text=result.data.text.replace(/\D/g,'');
 let nikMatch=text.match(/\d{16}/);
 nik.value=nikMatch?nikMatch[0]:"";

 // ================= NAMA AUTO FORMAT =================
 nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');

 // ================= AUTO TTL =================
 if(nik.value.length===16){
  let t=nik.value.substr(6,2);
  let b=nik.value.substr(8,2);
  let y=nik.value.substr(10,2);
  if(t>40)t-=40;
  ttl.value=`${t} / ${b} / 19${y}`;
 }

 // ================= CONFIDENCE =================
 let confNIK = nik.value.length===16 ? 90 : 40;
 let confFace = 90;
 let total=Math.round((confNIK+confFace)/2);

 scoreText.innerText=`Confidence: ${total}% | Face OK`;

 if(total<60){
  alert("Foto kurang jelas");
  loading.style.display="none";
  return;
 }

 loading.style.display="none";
 box.style.display="block";
};

// ================= INPUT FILTER =================
nik.oninput=()=>nik.value=nik.value.replace(/[^0-9]/g,'');

// ================= NAMA UPPERCASE REALTIME =================
nama.addEventListener("input", ()=>{
 nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');
});

// ================= UPLOAD =================
check.addEventListener("change", ()=>{
 if(!check.checked||!fileBlob)return;

 uploadBar.style.display="block";

 let p=0;
 let int=setInterval(()=>{
  p+=10;
  uploadProgress.style.width=p+"%";
  if(p>=100){
   clearInterval(int);
   alert("Berhasil");
  }
 },200);
});

</script>

</body>
</html>
