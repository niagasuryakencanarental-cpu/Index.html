<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
 margin:0;
 background:#000;
 color:#fff;
 font-family:'Orbitron';
 text-align:center;
}

.frame{
 width:85%;
 max-width:420px;
 aspect-ratio:10/6;
 border:2mm solid #888;
 margin:20px auto;
 border-radius:10px;
 background:#111;
 display:flex;
 justify-content:center;
 align-items:center;
 position:relative;
}

.frame img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:none;
}

.label{
 position:absolute;
 color:#00aaff;
}

.btn-foto{
 width:85%;
 max-width:420px;
 padding:14px;
 margin:10px auto;
 background:linear-gradient(45deg,#003366,#0055aa);
 color:#000;
 font-weight:900;
 border:none;
 border-radius:8px;
 cursor:pointer;
}

.form{display:none;}

.input{
 width:85%;
 max-width:420px;
 padding:10px;
 margin:5px auto;
 border-radius:6px;
 border:none;
}

.checkbox{
 display:none;
 width:85%;
 max-width:420px;
 margin:10px auto;
 font-size:12px;
 text-align:left;
}

#loadingScreen{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:#000;
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:999;
}

.loader{
 border:5px solid #222;
 border-top:5px solid #00aaff;
 border-radius:50%;
 width:50px;
 height:50px;
 animation:spin 1s linear infinite;
}

@keyframes spin{
 0%{transform:rotate(0);}
 100%{transform:rotate(360deg);}
}

#popupSuccess{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 justify-content:center;
 align-items:center;
}

.popup-box{
 background:#111;
 padding:25px;
 border-radius:12px;
 width:80%;
 max-width:320px;
}

#btnLanjut{
 width:100%;
 padding:12px;
 background:linear-gradient(45deg,#007bff,#00aaff);
 color:#000;
 font-weight:bold;
 border:none;
 border-radius:8px;
}

#uploadBar{
 width:85%;
 max-width:420px;
 margin:10px auto;
 display:none;
}

#uploadBar div{
 height:10px;
 background:#222;
 border-radius:10px;
 overflow:hidden;
}

#uploadProgress{
 height:100%;
 width:0%;
 background:#00aaff;
}
</style>
</head>

<body>

<h2>VERIFIKASI PELANGGAN</h2>

<div class="frame">
 <img id="preview">
 <div class="label" id="label">FOTO DOKUMEN</div>
</div>

<button type="button" class="btn-foto" id="btnFoto">AMBIL FOTO</button>

<div class="form" id="formOCR">
 <input class="input" id="nik" placeholder="Nomor Identitas">
 <input class="input" id="nama" placeholder="Nama Lengkap">
 <input class="input" id="ttl" placeholder="Tanggal Lahir (DD / MM / YYYY)">
</div>

<div class="checkbox" id="box">
 <input type="checkbox" id="check">
 Saya setuju data sudah sesuai dokumen
</div>

<div id="uploadBar">
 <div>
  <div id="uploadProgress"></div>
 </div>
 <p id="uploadText">Upload 0%</p>
</div>

<div id="loadingScreen">
 <div class="loader"></div>
 <p id="loadingText">Memproses... 0%</p>
</div>

<div id="popupSuccess">
 <div class="popup-box">
  <h3>Verifikasi Berhasil</h3>
  <p>Data pelanggan berhasil dikirim</p>
  <button id="btnLanjut">LANJUTKAN</button>
 </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.appspot.com",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

/* ELEMENT */
const btnFoto = document.getElementById("btnFoto");
const cameraInput = document.getElementById("cameraInput");
const preview = document.getElementById("preview");
const label = document.getElementById("label");

const nik = document.getElementById("nik");
const nama = document.getElementById("nama");
const ttl = document.getElementById("ttl");

const formOCR = document.getElementById("formOCR");
const box = document.getElementById("box");
const check = document.getElementById("check");

const loadingScreen = document.getElementById("loadingScreen");
const loadingText = document.getElementById("loadingText");

const uploadBar = document.getElementById("uploadBar");
const uploadProgress = document.getElementById("uploadProgress");
const uploadText = document.getElementById("uploadText");

const popupSuccess = document.getElementById("popupSuccess");
const btnLanjut = document.getElementById("btnLanjut");

let fileBlob = null;

/* CAMERA */
btnFoto.addEventListener("click", () => {
 cameraInput.value = "";
 cameraInput.click();
});

/* FORMAT TANGGAL */
ttl.addEventListener("input", e => {
 let v = e.target.value.replace(/\D/g,"").slice(0,8);
 e.target.value = v.replace(/(\d{2})(\d{2})(\d{4})/,"$1 / $2 / $3");
});

/* OCR */
function extract(t){
 t = t.replace(/\s+/g,' ');
 let nik = (t.match(/\b\d{16}\b/)||[""])[0];
 let nama = ((t.match(/NAMA\s*[:\-]?\s*([A-Z\s]+)/)||["",""])[1]).trim();
 let ttlRaw = t.match(/(\d{2})[\/\-]?(\d{2})[\/\-]?(\d{4})/);
 let ttl = ttlRaw ? `${ttlRaw[1]} / ${ttlRaw[2]} / ${ttlRaw[3]}` : "";
 return {nik,nama,ttl};
}

/* VALIDASI */
function validateData(nikVal,namaVal,ttlVal){
 if(!nikVal) return "Nomor identitas kosong";
 if(namaVal.length < 3) return "Nama tidak valid";
 if(!ttlVal) return "Tanggal lahir belum diisi";
 return null;
}

/* PROSES FOTO */
cameraInput.addEventListener("change", async e => {
 const file = e.target.files[0];
 if(!file) return;

 fileBlob = file;

 preview.src = URL.createObjectURL(file);
 preview.style.display = "block";
 label.style.display = "none";

 loadingScreen.style.display = "flex";

 try{
  console.log("OCR mulai...");

  /* ===== PREPROCESS IMAGE ===== */
  const img = new Image();
  img.src = URL.createObjectURL(file);

  await new Promise(res => img.onload = res);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const maxWidth = 1000;
  const scale = maxWidth / img.width;

  canvas.width = maxWidth;
  canvas.height = img.height * scale;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  // grayscale + threshold biar teks tajam
  for(let i=0;i<data.length;i+=4){
    let avg = (data[i]+data[i+1]+data[i+2])/3;
    avg = avg > 140 ? 255 : 0;
    data[i]=data[i+1]=data[i+2]=avg;
  }

  ctx.putImageData(imageData,0,0);

  /* ===== OCR ===== */
  const result = await Tesseract.recognize(canvas,'eng+ind',{
   logger:m=>{
    if(m.status==="recognizing text"){
     loadingText.innerText="Memproses... "+Math.round(m.progress*100)+"%";
    }
   }
  });

  console.log("HASIL OCR:", result.data.text);

  const hasil = result.data.text.toUpperCase();
  const parsed = extract(hasil);

  nik.value = parsed.nik;
  nama.value = parsed.nama;
  ttl.value = parsed.ttl;

  formOCR.style.display = "block";
  box.style.display = "block";

 }catch(err){
  alert("OCR gagal / tidak terbaca");
  console.error(err);
 }

 loadingScreen.style.display = "none";
});

/* UPLOAD */
check.addEventListener("change", () => {
 if(!check.checked || !fileBlob) return;

 const error = validateData(nik.value,nama.value,ttl.value);
 if(error){
  alert(error);
  check.checked = false;
  return;
 }

 const fileName = "dokumen_"+Date.now()+".jpg";
 const storageRef = ref(storage,fileName);
 const uploadTask = uploadBytesResumable(storageRef,fileBlob);

 uploadBar.style.display = "block";

 uploadTask.on("state_changed",

 (snapshot)=>{
  let percent = Math.round((snapshot.bytesTransferred/snapshot.totalBytes)*100);
  uploadProgress.style.width = percent+"%";
  uploadText.innerText = "Upload "+percent+"%";
 },

 (error)=>{
  alert("Upload gagal: "+error.message);
 },

 async ()=>{
  await addDoc(collection(db,"verifikasi"),{
   identitas:nik.value,
   nama:nama.value,
   tanggal_lahir:ttl.value,
   file:fileName,
   createdAt:serverTimestamp()
  });

  popupSuccess.style.display = "flex";
 }
 );
});

/* LANJUT */
btnLanjut.addEventListener("click",()=>{
 window.location.href="index3.html";
});

</script>

</body>
</html>
