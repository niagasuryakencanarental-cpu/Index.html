<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:'Orbitron';text-align:center;}
.frame{width:85%;max-width:420px;aspect-ratio:10/6;border:2mm solid #888;margin:20px auto;border-radius:10px;background:#111;display:flex;justify-content:center;align-items:center;position:relative;}
.frame img{width:100%;height:100%;object-fit:cover;display:none;}
.label{position:absolute;color:#00aaff;}
.btn{width:85%;max-width:420px;padding:14px;margin:10px auto;background:linear-gradient(45deg,#003366,#0055aa);color:#000;font-weight:900;border:none;border-radius:8px;}
.input{width:85%;max-width:420px;padding:10px;margin:5px auto;border-radius:6px;border:none;}
.checkbox{display:none;margin:10px;}
#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column;}
.loader{border:5px solid #222;border-top:5px solid #00aaff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
#uploadBar{display:none;width:85%;margin:auto;}
#uploadProgress{height:10px;background:#00aaff;width:0%;}
</style>
</head>

<body>

<h2>VERIFIKASI PELANGGAN</h2>

<div class="frame">
 <img id="preview">
 <div class="label">FOTO KTP</div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
<button class="btn" id="btnFoto">AMBIL FOTO</button>

<input class="input" id="nik" placeholder="NIK" inputmode="numeric">
<input class="input" id="nama" placeholder="Nama">
<input class="input" id="ttl" placeholder="Tanggal Lahir" inputmode="numeric">

<div class="checkbox" id="box">
 <input type="checkbox" id="check"> Data sudah sesuai
</div>

<p id="scoreText"></p>

<div id="uploadBar"><div id="uploadProgress"></div></div>

<div id="loadingScreen">
 <div class="loader"></div>
 <p>Processing...</p>
</div>

<script>

// ================= ELEMENT =================
const btnFoto=document.getElementById("btnFoto");
const cameraInput=document.getElementById("cameraInput");
const preview=document.getElementById("preview");
const nik=document.getElementById("nik");
const nama=document.getElementById("nama");
const ttl=document.getElementById("ttl");
const check=document.getElementById("check");
const box=document.getElementById("box");
const loading=document.getElementById("loadingScreen");
const uploadBar=document.getElementById("uploadBar");
const uploadProgress=document.getElementById("uploadProgress");
const scoreText=document.getElementById("scoreText");

let fileBlob=null;

// ================= CAMERA =================
btnFoto.onclick=()=>cameraInput.click();

cameraInput.onchange=async e=>{
 const file=e.target.files[0];
 fileBlob=file;
 preview.src=URL.createObjectURL(file);
 preview.style.display="block";

 loading.style.display="flex";

 const img=new Image();
 img.src=preview.src;
 await new Promise(r=>img.onload=r);

 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");

 canvas.width=1000;
 canvas.height=(img.height/img.width)*1000;
 ctx.drawImage(img,0,0,canvas.width,canvas.height);

 // ================= PREPROCESS =================
 let data=ctx.getImageData(0,0,canvas.width,canvas.height);
 let d=data.data;

 for(let i=0;i<d.length;i+=4){
  let avg=(d[i]+d[i+1]+d[i+2])/3;
  let v=avg>130?255:0;
  d[i]=d[i+1]=d[i+2]=v;
 }
 ctx.putImageData(data,0,0);

 // ================= DETEKSI KTP =================
 function detectKTP(canvas){
  let d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let color=0;
  for(let i=0;i<d.length;i+=4){
   if(Math.abs(d[i]-d[i+1])>10) color++;
  }
  return (color/(d.length/4))*100;
 }

 let ktpScore=detectKTP(canvas);
 if(ktpScore<20){
  alert("Gunakan KTP asli");
  loading.style.display="none";
  return;
 }

 // ================= OCR =================
 const result=await Tesseract.recognize(canvas,'eng+ind');
 let text=result.data.text.toUpperCase();
 let words=result.data.words;

 text=text.replace(/[^A-Z0-9:/\-\s]/g,' ').replace(/\s+/g,' ');

 // NIK
 let nikMatch=text.match(/\b\d{16}\b/);
 nik.value=nikMatch?nikMatch[0]:"";

 // NAMA
 let namaMatch=text.match(/NAMA\s*[:\-]?\s*([A-Z\s]+)/);
 if(namaMatch){
  nama.value=namaMatch[1].split(" ").slice(0,4).join(" ");
 }

 // TTL
 let ttlMatch=text.match(/(\d{2})[\/\- ](\d{2})[\/\- ](\d{4})/);
 if(ttlMatch){
  ttl.value=`${ttlMatch[1]} / ${ttlMatch[2]} / ${ttlMatch[3]}`;
 }

 // ================= VALIDASI NIK =================
 function validasiNIK(n){
  if(!/^\d{16}$/.test(n)) return false;
  let t=parseInt(n.substr(6,2));
  if(t>40)t-=40;
  return t<=31;
 }

 // ================= CONFIDENCE =================
 function conf(val){
  let m=words.filter(w=>val.includes(w.text));
  if(!m.length)return 0;
  return m.reduce((a,b)=>a+b.confidence,0)/m.length;
 }

 let c1=conf(nik.value)+10;
 let c2=conf(nama.value);
 let c3=conf(ttl.value);

 let total=Math.round((c1+c2+c3)/3);

 scoreText.innerText=`Confidence: ${total}% | KTP Score: ${Math.round(ktpScore)}`;

 if(total<60){
  alert("Foto kurang jelas");
  loading.style.display="none";
  return;
 }

 loading.style.display="none";
 box.style.display="block";
}

// ================= INPUT FILTER =================
nik.oninput=()=>nik.value=nik.value.replace(/[^0-9]/g,'');
ttl.oninput=()=>ttl.value=ttl.value.replace(/[^0-9]/g,'');

// ================= AUTO TTL DARI NIK =================
nik.addEventListener("input", ()=>{
 if(nik.value.length===16){
  let t=nik.value.substr(6,2);
  let b=nik.value.substr(8,2);
  let y=nik.value.substr(10,2);
  if(t>40)t-=40;
  ttl.value=`${t} / ${b} / 19${y}`;
 }
});

// ================= UPLOAD =================
check.addEventListener("change", ()=>{
 if(!check.checked||!fileBlob)return;

 uploadBar.style.display="block";

 let p=0;
 let int=setInterval(()=>{
  p+=10;
  uploadProgress.style.width=p+"%";
  if(p>=100){
   clearInterval(int);
   alert("Berhasil");
  }
 },200);
});

</script>

</body>
</html>
