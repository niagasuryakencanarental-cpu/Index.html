<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Upload</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
}

.header {
  padding:12px;
  text-align:center;
  background:linear-gradient(90deg,#d4af37,#ffd700);
  color:#000;
  font-weight:bold;
}

.content { padding:15px; }

.form-group {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.status {
  font-size:12px;
  color:#00e676;
}

button {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
}

.active {
  background:linear-gradient(90deg,#d4af37,#ffd700);
  color:black;
}

.disabled {
  background:#444;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">Form Calon Pelanggan</div>

<div class="content">

  <div class="form-group">
    Upload KTP
    <input type="file" id="ktp" accept="image/*">
    <div id="s1" class="status"></div>
  </div>

  <div class="form-group">
    Upload Selfie
    <input type="file" id="selfie" accept="image/*">
    <div id="s2" class="status"></div>
  </div>

  <div class="form-group">
    Pilih Dokumen
    <select id="jenis">
      <option value="">Pilih</option>
      <option>KK</option>
      <option>NPWP</option>
    </select>

    <input type="file" id="dokumen">
    <div id="s3" class="status"></div>
  </div>

  <div class="form-group">
    Nomor WA
    <input type="tel" id="wa" placeholder="08xxxxxxxxxx">
    <div id="s4" class="status"></div>
  </div>

  <!-- ✅ PROGRESS FIX -->
  <div id="progressBox" style="display:none;">
    <div style="background:#333;border-radius:8px;">
      <div id="progressBar" style="height:8px;width:0%;background:#ffd700;"></div>
    </div>
  </div>

  <button id="lanjut" class="disabled" disabled>Kirim</button>

</div>

<script type="module">
/* =========================
   🔥 FIREBASE
========================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.firebasestorage.app",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* =========================
   🔥 DOM FIX (INI YANG TADI ERROR)
========================= */
const ktp = document.getElementById("ktp");
const selfie = document.getElementById("selfie");
const dokumen = document.getElementById("dokumen");
const jenis = document.getElementById("jenis");
const waInput = document.getElementById("wa");

const s1 = document.getElementById("s1");
const s2 = document.getElementById("s2");
const s3 = document.getElementById("s3");
const s4 = document.getElementById("s4");

const lanjut = document.getElementById("lanjut");
const progressBox = document.getElementById("progressBox");
const progressBar = document.getElementById("progressBar");

/* =========================
   STATE
========================= */
let data = {};

/* =========================
   WA FORMAT
========================= */
const formatWA = v => {
  v = v.replace(/\D/g,'');
  if(v.startsWith("8")) v = "0"+v;
  if(!v.startsWith("08")) v="08";
  return v.slice(0,13);
};

const validWA = v => /^08\d{8,11}$/.test(v);
const toIntl = v => v.replace(/^0/,"+62");

/* =========================
   EVENT
========================= */
ktp.onchange = () => { data.ktp=ktp.files[0]; s1.innerText="✔"; cek(); };
selfie.onchange = () => { data.selfie=selfie.files[0]; s2.innerText="✔"; cek(); };

dokumen.onchange = () => {
  if(!jenis.value) return alert("Pilih jenis!");
  data.dokumen=dokumen.files[0];
  s3.innerText="✔ "+jenis.value;
  cek();
};

waInput.oninput = () => {
  waInput.value = formatWA(waInput.value);
  if(validWA(waInput.value)){
    data.wa = waInput.value;
    s4.innerText="✔ valid";
  } else {
    data.wa=null;
    s4.innerText="";
  }
  cek();
};

function cek(){
  const valid =
    data.ktp &&
    data.selfie &&
    data.dokumen &&
    data.wa &&
    jenis.value;

  lanjut.disabled=!valid;
  lanjut.className = valid ? "active":"disabled";
}

/* =========================
   UPLOAD
========================= */
function upload(file,path){
  return new Promise((res,rej)=>{
    const task = uploadBytesResumable(ref(storage,path),file);

    task.on("state_changed",snap=>{
      let p = snap.bytesTransferred/snap.totalBytes*100;
      progressBar.style.width = p+"%";
    },rej, async()=>{
      res(await getDownloadURL(task.snapshot.ref));
    });
  });
}

/* =========================
   SUBMIT
========================= */
lanjut.onclick = async ()=>{
  if(lanjut.disabled) return;

  lanjut.disabled=true;
  progressBox.style.display="block";

  try{
    const wa = toIntl(data.wa);

    const t = Date.now();

    const ktpUrl = await upload(data.ktp,"ktp/"+t);
    const selfieUrl = await upload(data.selfie,"selfie/"+t);
    const dokUrl = await upload(data.dokumen,"dok/"+t);

    await addDoc(collection(db,"pelanggan"),{
      waktu:new Date(),
      wa,
      jenis:jenis.value,
      ktp:ktpUrl,
      selfie:selfieUrl,
      dokumen:dokUrl
    });

    alert("Berhasil 🔥");
    location.reload();

  }catch(e){
    console.error(e);
    alert("Gagal ❌");
    lanjut.disabled=false;
  }
};
</script>

</body>
</html>
