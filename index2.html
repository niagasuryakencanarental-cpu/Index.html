<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:20px}

input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

#btnKirim{
  display:none;
  background:#fff;
  color:#000;
  font-weight:bold;
  letter-spacing:1px;
}

#btnFoto{
  background:#00c896;
  color:#000;
  font-weight:bold;
}

#preview{
  max-width:90%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

#uploadBar{
  display:none;
  width:90%;
  height:10px;
  background:#333;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

#uploadProgress{
  height:10px;
  width:0%;
  background:#00ffcc;
}

#percentText{
  font-size:14px;
  margin-top:5px;
}

#loadingScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

#popupBox{
background:#111;
padding:20px;
border-radius:15px;
width:80%;
}
</style>
</head>

<body>

<h2>Verifikasi Pelanggan</h2>

<button id="btnFoto">Ambil Foto KTP</button>
<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<img id="preview">

<input id="nik" placeholder="NIK" inputmode="numeric">
<input id="nama" placeholder="Nama">
<input id="ttl" placeholder="DD/MM/YYYY" inputmode="numeric">

<button id="btnKirim">KIRIM DATA</button>

<div id="uploadBar"><div id="uploadProgress"></div></div>
<div id="percentText"></div>

<div id="loadingScreen"><p id="loadingText">Loading...</p></div>

<div id="popup">
  <div id="popupBox">
    <p>Data berhasil dikirim</p>
    <button onclick="lanjut()">Lanjutkan</button>
  </div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.appspot.com",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ELEMENT
const $ = id => document.getElementById(id);

const btnFoto = $("btnFoto");
const cameraInput = $("cameraInput");
const preview = $("preview");
const nik = $("nik");
const nama = $("nama");
const ttl = $("ttl");
const btnKirim = $("btnKirim");

const uploadBar = $("uploadBar");
const uploadProgress = $("uploadProgress");
const percentText = $("percentText");

const loading = $("loadingScreen");
const popup = $("popup");

let fileBlob = null;

// VALIDASI FORM
function cekForm(){
  if(nik.value && nama.value && ttl.value){
    btnKirim.style.display="block";
  }else{
    btnKirim.style.display="none";
  }
}

nik.oninput = ()=>{
  nik.value = nik.value.replace(/[^0-9]/g,'');
  cekForm();
};

nama.oninput = ()=>{
  nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g,'');
  cekForm();
};

// AUTO FORMAT TTL
ttl.oninput = ()=>{
  let v = ttl.value.replace(/[^0-9]/g,'').slice(0,8);

  if(v.length >= 5){
    ttl.value = v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4,8);
  }else if(v.length >= 3){
    ttl.value = v.slice(0,2)+"/"+v.slice(2,4);
  }else{
    ttl.value = v;
  }

  cekForm();
};

// FOTO
btnFoto.onclick = () => cameraInput.click();

cameraInput.onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  loading.style.display="flex";

  fileBlob = file;

  preview.src = URL.createObjectURL(fileBlob);
  preview.style.display="block";

  const result = await Tesseract.recognize(fileBlob,'eng',{
    tessedit_char_whitelist:'0123456789'
  });

  const text = result.data.text.replace(/\D/g,'');
  const nikMatch = text.match(/\d{16}/);

  nik.value = nikMatch ? nikMatch[0] : "";

  cekForm();
  loading.style.display="none";
};

// UPLOAD
btnKirim.onclick = async ()=>{
  if(!fileBlob){
    alert("Ambil foto dulu");
    return;
  }

  uploadBar.style.display="block";

  const ref = storage.ref("ktp/ktp_"+Date.now()+".jpg");
  const uploadTask = ref.put(fileBlob);

  uploadTask.on("state_changed",
    snap=>{
      const p = Math.round((snap.bytesTransferred/snap.totalBytes)*100);
      uploadProgress.style.width = p+"%";
      percentText.innerText = p + "%";
    },
    ()=>alert("Upload gagal"),
    async ()=>{
      const url = await ref.getDownloadURL();

      await db.collection("verifikasi").add({
        nik: nik.value,
        nama: nama.value,
        ttl: ttl.value,
        foto: url,
        created_at: new Date()
      });

      popup.style.display="flex";
    }
  );
};

// LANJUT
function lanjut(){
  window.location.href = "index3.html";
}

</script>

</body>
</html>
