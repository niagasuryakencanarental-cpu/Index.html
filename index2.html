<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Form Calon Pelanggan</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  opacity:0;
  transition:0.3s;
}

.header {
  padding:16px;
  text-align:center;
  background:#000;
  color:#ffd700;
  font-weight:900;
  font-size:20px;
}

.content { padding:15px; }

.form-group {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.status {
  font-size:12px;
  font-weight:bold;
  margin-top:5px;
}

.progress {
  height:6px;
  width:0%;
  background:#ffd700;
  border-radius:5px;
  margin-top:5px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
}

.active {
  background:#ffd700;
  color:#000;
}

.disabled {
  background:#444;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">FORM CALON PELANGGAN</div>

<div class="content">

  <div class="form-group">
    Upload KTP
    <input type="file" id="ktp" accept="image/*">
    <div id="p1" class="progress"></div>
    <div id="s1" class="status"></div>
  </div>

  <div class="form-group">
    Upload Selfie
    <input type="file" id="selfie" accept="image/*">
    <div id="p2" class="progress"></div>
    <div id="s2" class="status"></div>
  </div>

  <div class="form-group">
    Dokumen Pendukung
    <select id="jenis">
      <option value="">Pilih</option>
      <option>KK</option>
      <option>NPWP</option>
      <option>ID Kerja</option>
    </select>
    <input type="file" id="dokumen" accept="image/*">
    <div id="p3" class="progress"></div>
    <div id="s3" class="status"></div>
  </div>

  <div class="form-group">
    Nomor WhatsApp
    <input type="tel" id="wa" placeholder="08xxxxxxxxxx">
    <div id="s4" class="status"></div>
  </div>

  <div class="form-group">
    <div id="infoLokasi">Mengambil lokasi...</div>
  </div>

  <button id="lanjut" class="disabled" disabled>Kirim</button>

</div>

<script type="module">

/* DEBUG */
window.onerror = (m)=>alert("ERROR: "+m);

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.appspot.com",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* DOM */
const el=id=>document.getElementById(id);

const ktp=el("ktp"), selfie=el("selfie"), dokumen=el("dokumen");
const jenis=el("jenis"), wa=el("wa");

const s1=el("s1"), s2=el("s2"), s3=el("s3"), s4=el("s4");
const p1=el("p1"), p2=el("p2"), p3=el("p3");

const btn=el("lanjut");
const infoLokasi=el("infoLokasi");

/* STATE */
let data={};

/* LIMIT */
const MAX=10*1024*1024;

/* WA */
const clean=v=>v.replace(/\D/g,"");
const validWA=v=>/^08\d{8,11}$/.test(v);
const toIntl=v=>v.replace(/^0/,"+62");

/* VALIDASI */
function cek(){
  const ok=data.ktp&&data.selfie&&data.dokumen&&data.wa&&jenis.value;
  btn.disabled=!ok;
  btn.className=ok?"active":"disabled";
}

/* COMPRESS */
async function compress(file){
  return new Promise(res=>{
    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const scale=800/img.width;

      canvas.width=800;
      canvas.height=img.height*scale;

      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      canvas.toBlob(blob=>{
        res(new File([blob],file.name,{type:"image/jpeg"}));
      },"image/jpeg",0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* UPLOAD */
async function upload(file,path,status,progress){
  file=await compress(file);

  return new Promise((res,rej)=>{
    const task=uploadBytesResumable(ref(storage,path),file);

    task.on("state_changed",snap=>{
      progress.style.width=(snap.bytesTransferred/snap.totalBytes*100)+"%";
    },rej,async()=>{
      status.innerHTML="✔ sukses";
      status.style.color="#00e676";
      res(await getDownloadURL(task.snapshot.ref));
    });
  });
}

/* EVENTS */
ktp.onchange=()=>{
  const f=ktp.files[0];
  if(f.size>MAX) return alert("Max 10MB");
  data.ktp=f; s1.innerText="✔ OK"; cek();
};

selfie.onchange=()=>{
  const f=selfie.files[0];
  if(f.size>MAX) return alert("Max 10MB");
  data.selfie=f; s2.innerText="✔ OK"; cek();
};

dokumen.onchange=()=>{
  if(!jenis.value) return alert("Pilih dokumen!");
  const f=dokumen.files[0];
  if(f.size>MAX) return alert("Max 10MB");
  data.dokumen=f; s3.innerText="✔ OK"; cek();
};

wa.oninput=()=>{
  wa.value=clean(wa.value);
  if(validWA(wa.value)){
    data.wa=wa.value;
    s4.innerHTML="✔ valid";
    s4.style.color="#00e676";
  }else{
    data.wa=null;
    s4.innerHTML="";
  }
  cek();
};

/* LOCATION */
navigator.geolocation.getCurrentPosition(pos=>{
  data.lokasi=`${pos.coords.latitude},${pos.coords.longitude}`;
  infoLokasi.innerText="📍 "+data.lokasi;
},()=>{
  data.lokasi="-";
  infoLokasi.innerText="Lokasi ditolak";
});

/* SUBMIT */
btn.onclick=async()=>{
  btn.disabled=true;

  try{
    const t=Date.now();

    const ktpUrl=await upload(data.ktp,"ktp/"+t,s1,p1);
    const selfieUrl=await upload(data.selfie,"selfie/"+t,s2,p2);
    const dokUrl=await upload(data.dokumen,"dok/"+t,s3,p3);

    await addDoc(collection(db,"pelanggan"),{
      wa:toIntl(data.wa),
      lokasi:data.lokasi,
      jenis:jenis.value,
      ktp:ktpUrl,
      selfie:selfieUrl,
      dokumen:dokUrl,
      waktu:new Date()
    });

    alert("Berhasil 🔥");
    location.reload();

  }catch(e){
    alert("Error: "+e.message);
    btn.disabled=false;
  }
};

/* INIT */
window.onload=()=>document.body.style.opacity="1";

</script>

</body>
</html>
