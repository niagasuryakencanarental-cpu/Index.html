<script>
document.addEventListener("DOMContentLoaded", () => {

  // ================= FIREBASE =================
  const firebaseConfig = {
    apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
    authDomain: "nskrental-bbf87.firebaseapp.com",
    projectId: "nskrental-bbf87",
    storageBucket: "nskrental-bbf87.appspot.com",
    messagingSenderId: "654715207587",
    appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ================= ELEMENT =================
  const $ = id => document.getElementById(id);

  const btnFoto = $("btnFoto");
  const cameraInput = $("cameraInput");
  const preview = $("preview");

  const nik = $("nik");
  const nama = $("nama");
  const ttl = $("ttl");
  const btnKirim = $("btnKirim");

  const uploadBar = $("uploadBar");
  const uploadProgress = $("uploadProgress");
  const percentText = $("percentText");

  const loading = $("loadingScreen");
  const popup = $("popup");

  let fileBlob = null;

  // ================= KOMPRES GAMBAR =================
  const compressImage = file => new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 1280;

      let { width, height } = img;

      if (width > maxWidth) {
        height *= maxWidth / width;
        width = maxWidth;
      }

      canvas.width = width;
      canvas.height = height;

      canvas.getContext("2d").drawImage(img, 0, 0, width, height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });

  // ================= VALIDASI =================
  const cekForm = () => {
    btnKirim.style.display =
      (nik.value && nama.value && ttl.value) ? "block" : "none";
  };

  nik.oninput = () => {
    nik.value = nik.value.replace(/[^0-9]/g, '');
    cekForm();
  };

  nama.oninput = () => {
    nama.value = nama.value.toUpperCase().replace(/[^A-Z\s]/g, '');
    cekForm();
  };

  ttl.oninput = () => {
    let v = ttl.value.replace(/[^0-9]/g, '').slice(0, 8);

    if (v.length >= 5) {
      ttl.value = `${v.slice(0,2)}/${v.slice(2,4)}/${v.slice(4,8)}`;
    } else if (v.length >= 3) {
      ttl.value = `${v.slice(0,2)}/${v.slice(2,4)}`;
    } else {
      ttl.value = v;
    }

    cekForm();
  };

  // ================= FOTO =================
  btnFoto.onclick = () => cameraInput.click();

  cameraInput.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;

    loading.style.display = "block";

    const compressed = await compressImage(file);

    if (compressed.size > 2 * 1024 * 1024) {
      alert("Ukuran > 2MB");
      loading.style.display = "none";
      return;
    }

    fileBlob = compressed;

    preview.src = URL.createObjectURL(fileBlob);
    preview.style.display = "block";

    const result = await Tesseract.recognize(fileBlob, 'eng');
    const text = result.data.text.replace(/\D/g, '');
    const nikMatch = text.match(/\d{16}/);

    nik.value = nikMatch ? nikMatch[0] : "";

    cekForm();
    loading.style.display = "none";
  };

  // ================= UPLOAD =================
  btnKirim.onclick = async () => {
    if (!fileBlob) {
      alert("Ambil foto dulu");
      return;
    }

    uploadBar.style.display = "block";

    try {
      const formData = new FormData();
      formData.append("file", fileBlob);
      formData.append("upload_preset", "ml_default");

      const res = await fetch("https://api.cloudinary.com/v1_1/dppi5twst/image/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!data.secure_url) throw new Error("Upload gagal");

      uploadProgress.style.width = "100%";
      percentText.innerText = "100%";

      await db.collection("verifikasi").add({
        nik: nik.value,
        nama: nama.value,
        ttl: ttl.value,
        foto: data.secure_url,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });

      popup.style.display = "block";

    } catch (err) {
      alert("Upload gagal: " + err.message);
      console.error(err);
    }
  };

  // ================= LANJUT =================
  window.lanjut = () => {
    location.href = "index3.html";
  };

});
</script>
