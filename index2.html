<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi KTP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:'Orbitron',sans-serif;
    text-align:center;
}

/* FRAME */
.frame {
    width:85%;
    max-width:420px;
    aspect-ratio:10/6;
    border:2mm solid #888;
    margin:20px auto;
    border-radius:10px;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.frame img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.label {
    position:absolute;
    color:#00aaff;
    font-size:16px;
    letter-spacing:3px;
    opacity:0.7;
}

/* BUTTON */
.btn {
    width:85%;
    max-width:420px;
    padding:14px;
    margin:10px auto;
    background:linear-gradient(45deg,#d4af37,#ffd700);
    border:none;
    color:#000;
    font-weight:bold;
    border-radius:8px;
}

.btn-kirim {
    width:85%;
    max-width:420px;
    padding:14px;
    margin-top:25px;
    background:linear-gradient(45deg,#005eff,#00aaff);
    color:#fff;
    border:none;
    font-weight:900;
    letter-spacing:2px;
    border-radius:8px;
}

/* NOTIF */
.notif {
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>VERIFIKASI KTP</h2>

<div class="frame">
    <img id="preview">
    <div class="label" id="label">FOTO KTP</div>
</div>

<button class="btn" onclick="ambilFoto()">AMBIL FOTO</button>
<button class="btn-kirim" onclick="kirim()">KIRIM</button>

<div class="notif" id="notif"></div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI.firebaseapp.com",
  projectId: "ISI",
  storageBucket: "ISI.appspot.com",
  appId: "ISI_APPID"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

let lat="", lon="";
let uploadSelesai=false;
let fileRef=null;

/* LOKASI */
navigator.geolocation.getCurrentPosition(pos=>{
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
});

/* AMBIL FOTO */
window.ambilFoto = ()=>{
    document.getElementById("cameraInput").click();
};

/* VALIDASI KTP */
function validasiKTP(img){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

    let green=0;

    for(let i=0;i<data.length;i+=4){
        const r=data[i], g=data[i+1], b=data[i+2];
        if(g>r && g>b && g>100) green++;
    }

    return (green/(data.length/4)) > 0.1;
}

/* HANDLE FOTO */
cameraInput.onchange = async e=>{
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = async e=>{
        const img = document.getElementById("preview");
        img.src = e.target.result;
        img.style.display="block";
        label.style.display="none";

        notif.innerText="Validasi...";

        /* VALIDASI */
        if(!validasiKTP(img)){
            notif.innerText="❌ Bukan KTP";
            return;
        }

        /* COMPRESS */
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img,0,0);

        let quality=0.9;
        let dataUrl;

        do{
            dataUrl = canvas.toDataURL("image/jpeg",quality);
            quality -=0.1;
        }while(dataUrl.length>2*1024*1024 && quality>0.3);

        const blob = await (await fetch(dataUrl)).blob();

        if(blob.size>2*1024*1024){
            notif.innerText="❌ File > 2MB";
            return;
        }

        notif.innerText="UPLOADING...";

        const fileName="ktp_"+Date.now()+".jpg";
        fileRef = ref(storage,fileName);

        await uploadBytes(fileRef,blob,{
            metadata:{lat,lon}
        });

        notif.innerText="PROCESSING WATERMARK...";

        setTimeout(async ()=>{
            const url = await getDownloadURL(fileRef);
            img.src = url;
            notif.innerText="UPLOAD SUCCESS";
            uploadSelesai=true;
        },4000);
    };

    reader.readAsDataURL(file);
};

/* KIRIM */
window.kirim = ()=>{
    if(!uploadSelesai){
        alert("Belum selesai upload!");
        return;
    }

    alert("Data berhasil dikirim!");
};

</script>

</body>
</html>
