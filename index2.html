<script type="module">
/* =========================
   FIREBASE SETUP
========================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXMiJ8u65ex6D3LtbrzKyEKhAeGtg7Zps",
  authDomain: "nskrental-bbf87.firebaseapp.com",
  projectId: "nskrental-bbf87",
  storageBucket: "nskrental-bbf87.firebasestorage.app",
  messagingSenderId: "654715207587",
  appId: "1:654715207587:web:73f5281b0fdcdecf8c6416"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* =========================
   DOM
========================= */
const el = id => document.getElementById(id);

const lanjut = el("lanjut");
const waInput = el("wa");
const progressBox = el("progressBox");
const progressBar = el("progressBar");

/* =========================
   STATE
========================= */
let data = {
  ktp: null,
  selfie: null,
  dokumen: null,
  wa: null
};

/* =========================
   SECURITY CHECK
========================= */
if(localStorage.getItem("agree") !== "yes"){
  window.location.href = "index.html";
}

/* =========================
   INIT
========================= */
window.onload = () => document.body.style.opacity = "1";

/* =========================
   UTIL - WA
========================= */
const onlyNumber = v => v.replace(/\D/g, "");

const formatWA = v => {
  v = onlyNumber(v);
  if (v.startsWith("8")) v = "0" + v;
  if (!v.startsWith("08")) v = "08";
  return v.slice(0,13);
};

const isValidWA = v => /^08\d{8,11}$/.test(v);
const toIntl = v => v.replace(/^0/, "+62");

/* =========================
   UTIL - IMAGE COMPRESS
========================= */
const compressImage = (file, quality = 0.7) => new Promise(resolve => {
  const img = new Image();
  const reader = new FileReader();

  reader.onload = e => img.src = e.target.result;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    let w = img.width, h = img.height;

    if (w > 1280) {
      h *= 1280 / w;
      w = 1280;
    }

    canvas.width = w;
    canvas.height = h;

    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    canvas.toBlob(blob => resolve(blob), "image/jpeg", quality);
  };

  reader.readAsDataURL(file);
});

/* =========================
   UTIL - UPLOAD
========================= */
const uploadFile = (file, path) => new Promise((resolve, reject) => {
  const task = uploadBytesResumable(ref(storage, path), file);

  task.on("state_changed",
    snap => {
      const progress = (snap.bytesTransferred / snap.totalBytes) * 100;
      progressBar.style.width = progress + "%";
    },
    reject,
    async () => resolve(await getDownloadURL(task.snapshot.ref))
  );
});

/* =========================
   UI UPDATE
========================= */
const setStatus = (id, text) => el(id).innerText = text;

const updateButton = () => {
  const valid =
    data.ktp &&
    data.selfie &&
    data.dokumen &&
    data.wa &&
    jenis.value;

  lanjut.disabled = !valid;
  lanjut.className = valid ? "active" : "disabled";
};

/* =========================
   EVENTS
========================= */

// FILE INPUT
ktp.onchange = () => {
  data.ktp = ktp.files[0];
  setStatus("s1", "✔ OK");
  updateButton();
};

selfie.onchange = () => {
  data.selfie = selfie.files[0];
  setStatus("s2", "✔ OK");
  updateButton();
};

dokumen.onchange = () => {
  if(!jenis.value){
    alert("Pilih jenis dokumen!");
    return;
  }
  data.dokumen = dokumen.files[0];
  setStatus("s3", "✔ " + jenis.value);
  updateButton();
};

// WA INPUT
waInput.addEventListener("input", () => {
  waInput.value = formatWA(waInput.value);

  if(isValidWA(waInput.value)){
    data.wa = waInput.value;
    setStatus("s4", "✔ valid");
  } else {
    data.wa = null;
    setStatus("s4", "");
  }

  updateButton();
});

/* =========================
   SUBMIT
========================= */
lanjut.onclick = async () => {
  if(lanjut.disabled) return;

  lanjut.disabled = true;
  lanjut.innerText = "Processing...";
  progressBox.style.display = "block";

  try {
    const wa = toIntl(data.wa);

    const [ktpC, selfieC, dokC] = await Promise.all([
      compressImage(data.ktp),
      compressImage(data.selfie),
      compressImage(data.dokumen)
    ]);

    const timestamp = Date.now();

    const [ktpUrl, selfieUrl, dokUrl] = await Promise.all([
      uploadFile(ktpC, "ktp/" + timestamp),
      uploadFile(selfieC, "selfie/" + timestamp),
      uploadFile(dokC, "dokumen/" + timestamp)
    ]);

    await addDoc(collection(db, "pelanggan"), {
      waktu: new Date(),
      wa,
      lokasi: lokasi.innerText,
      jenis: jenis.value,
      ktp: ktpUrl,
      selfie: selfieUrl,
      dokumen: dokUrl
    });

    alert("Berhasil 🔥");
    location.reload();

  } catch (err) {
    console.error(err);
    alert("Gagal ❌");

    lanjut.disabled = false;
    lanjut.innerText = "Kirim";
    progressBox.style.display = "none";
  }
};
</script>
